name: CI/CD Docker Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy AWS CloudFormation Infrastructure
      id: cloudformation
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: ai-compiler-fixer-docker-stack-v3
        template: aws/template.yml
        no-fail-on-empty-changeset: "1"
        parameter-overrides: "KeyPairName=${{ secrets.AWS_KEY_PAIR_NAME }}"

    - name: Fetch EC2 Public IP
      run: |
        EC2_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=AI-Compiler-Fixer-Server" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PublicIpAddress" --output text)
        echo "EC2_PUBLIC_IP=$EC2_IP" >> $GITHUB_ENV

    - name: Set up Environment & Install Docker via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          # Install Docker and Docker Compose if not already present
          if ! command -v docker &> /dev/null
          then
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose-v2
            sudo usermod -aG docker ubuntu
          fi

          # Setup project deployment target folder
          sudo mkdir -p /var/www/ai_compiler_fixer
          sudo chown -R ubuntu:ubuntu /var/www/ai_compiler_fixer

    - name: Transfer Project Files to EC2 Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        source: "./*"
        target: "/var/www/ai_compiler_fixer"

    - name: Boot Docker Containers & Download Model
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/ai_compiler_fixer

          # Build and launch the application ecosystem out of sight
          sudo docker compose up --build -d

          # Command the isolated Ollama container to download your code-fixing weights
          sudo docker compose exec -d ollama ollama run qwen2.5-coder:1.5b