name: CI/CD Docker Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy AWS CloudFormation Infrastructure
      id: cloudformation
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: ai-compiler-fixer-docker-stack-v4
        template: aws/template.yml
        no-fail-on-empty-changeset: "1"
        parameter-overrides: "KeyPairName=${{ secrets.AWS_KEY_PAIR_NAME }}"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, Tag, and Push Image to Amazon ECR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/ai-compiler-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Fetch EC2 Public IP
      run: |
        EC2_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=AI-Compiler-Fixer-Server" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PublicIpAddress" --output text)
        echo "EC2_PUBLIC_IP=$EC2_IP" >> $GITHUB_ENV

    - name: Set up Production Environment & Docker Compose Config via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          # Install Docker and Docker Compose if missing
          if ! command -v docker &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose-v2
            sudo usermod -aG docker ubuntu
          fi

          # Install AWS CLI dependencies if missing
          if ! command -v aws &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y unzip curl
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            rm -rf aws awscliv2.zip
          fi

          sudo mkdir -p /var/www/ai_compiler_fixer
          sudo chown -R ubuntu:ubuntu /var/www/ai_compiler_fixer

    - name: Sync Orchestration Files Only
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        source: "docker-compose.yml"
        target: "/var/www/ai_compiler_fixer"

    - name: Pull From ECR & Launch Container Services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/ai_compiler_fixer
          
          # Pass credentials down so the instance can invoke verification checks natively
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="us-east-1"
          
          # Let the EC2 machine find out its own Account ID via the local AWS CLI 
          export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)

          # Write out a local .env file so Docker Compose can reference the account ID variable securely
          echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" > .env

          # Authenticate your local Docker engine into the private AWS ECR Registry path
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com
          
          # Pull down images using the fresh environment variables and spin up your stack
          docker compose pull
          docker compose up -d

          # Wait for the Ollama container port mappings to settle, then download model weights
          sleep 5
          docker compose exec -d ollama ollama run qwen2.5-coder:1.5b