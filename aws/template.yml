AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploy AI Compiler Fixer with Docker on an EC2 instance'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  CompilerFixerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AI-Compiler-VPC

  CompilerFixerSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CompilerFixerVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  CompilerFixerInternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref CompilerFixerVPC
      InternetGatewayId: !Ref CompilerFixerInternetGateway

  CompilerFixerRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CompilerFixerVPC

  CompilerFixerRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref CompilerFixerRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref CompilerFixerInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref CompilerFixerSubnet
      RouteTableId: !Ref CompilerFixerRouteTable

  CompilerFixerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and Streamlit traffic
      VpcId: !Ref CompilerFixerVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          CidrIp: 0.0.0.0/0

  CompilerFixerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      # This magical line automatically fetches the latest official Ubuntu 22.04 LTS image for whatever region you are running in!
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref CompilerFixerSubnet
      SecurityGroupIds:
        - !Ref CompilerFixerSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: AI-Compiler-Fixer-Server